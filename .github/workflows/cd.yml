name: CD

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - ".github/PULL_REQUEST_TEMPLATE.md"

jobs:
  deploy-prod:
    name: Deploy prod
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_SP_CLIENT_ID: ${{ secrets.DATABRICKS_SP_CLIENT_ID }}
      DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
      CATALOG: ${{ vars.CATALOG || 'dataops_template' }}
    steps:
      - uses: actions/checkout@v7

      - name: Fix detached HEAD
        run: git checkout -B ${{ github.ref_name }}

      - uses: databricks/setup-cli@main

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Create prod schema
        run: make create-schema-prod

      - name: Deploy prod
        run: make deploy-prod

      - name: Run operational job
        run: make run-prod
