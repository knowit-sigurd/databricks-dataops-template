# This file is loaded by Spark because the devcontainer sets SPARK_CONF_DIR to
# /workspace/databricks-dev-container/.devcontainer/spark-conf.
#
# Spark Declarative Pipelines writes managed-table metadata to the local Spark
# catalog. Using a Hive-compatible Derby metastore lets repeated local
# `spark-pipelines run` invocations remember that metadata instead of failing on
# already-existing managed table directories.
#
# This metastore is metadata only. Spark's default managed-table data directory
# remains `spark-warehouse/<table-name>/` in the example directory, where users
# can inspect the generated Parquet files.
#
# The Derby database path is intentionally relative. Spark resolves
# `target/metastore_db` from the current working directory of the
# `spark-pipelines` command, so running from each example directory gives each
# example its own ignored metastore:
#
#   examples/sdp-python-simple/target/metastore_db
#   examples/sdp-python-remote-uc/target/metastore_db
#
# Do not hardcode an example-specific absolute metastore path here; that causes
# one example to read another example's catalog metadata. Also avoid setting
# spark.sql.warehouse.dir here because Spark Connect may try to mutate it after
# the session is created.
spark.sql.catalogImplementation hive
spark.hadoop.javax.jdo.option.ConnectionURL jdbc:derby:;databaseName=target/metastore_db;create=true
spark.hadoop.javax.jdo.option.ConnectionDriverName org.apache.derby.jdbc.EmbeddedDriver
