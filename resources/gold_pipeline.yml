resources:
  pipelines:
    gold_pipeline:
      name: "[${var.catalog}] [${var.target_schema}] gold_pipeline"
      catalog: ${var.catalog}
      target: ${var.target_schema}
      serverless: true
      configuration:
        catalog: ${var.catalog}
        target_schema: ${var.target_schema}
      libraries:
        - file:
            path: ../src/data_product/pipelines/gold_pipeline.py
      environment:
        dependencies:
          - --editable ${workspace.file_path}
