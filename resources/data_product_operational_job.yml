resources:
  jobs:
    data_product_operational_job:
      name: "[${var.catalog}] data_product_operational_job"

      tasks:
        - task_key: run_customers
          pipeline_task:
            pipeline_id: ${resources.pipelines.customers_pipeline.id}

        - task_key: run_orders
          pipeline_task:
            pipeline_id: ${resources.pipelines.orders_pipeline.id}

        - task_key: validate_silver_readiness
          depends_on:
            - task_key: run_customers
            - task_key: run_orders
          notebook_task:
            notebook_path: ../src/data_product/pipelines/validate_silver_readiness.py
            base_parameters:
              catalog: ${var.catalog}
              target_schema: ${var.target_schema}
              customers_pipeline_id: ${resources.pipelines.customers_pipeline.id}
              orders_pipeline_id: ${resources.pipelines.orders_pipeline.id}

        - task_key: run_gold
          depends_on:
            - task_key: validate_silver_readiness
          pipeline_task:
            pipeline_id: ${resources.pipelines.gold_pipeline.id}

        - task_key: validate_gold_contract
          depends_on:
            - task_key: run_gold
          notebook_task:
            notebook_path: ../src/data_product/pipelines/validate_gold_contract.py
            base_parameters:
              catalog: ${var.catalog}
              target_schema: ${var.target_schema}
