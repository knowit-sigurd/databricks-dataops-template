bundle:
  name: databricks-dataops-template
  databricks_cli_version: ">= 0.240.0"

variables:
  catalog:
    description: Unity Catalog catalog name
    default: dataops_template
  target_schema:
    description: "Schema for this deployment. For pr target, pass --var target_schema=pr_<PR_NUMBER>"
    default: dev
  sp_client_id:
    description: Service principal application UUID for prod run_as
    default: ""
  quality_mode:
    description: "Expectation mode for business_invalid rules: drop (dev/pr) or fail (prod)"
    default: drop

workspace:
  root_path: ~/databricks-dataops-template/${bundle.target}/${bundle.git.branch}

python:
  venv_path: .venv
  mutators:
    - mutators.tags:tag_pipeline
    - mutators.tags:tag_job

presets:
  tags:
    project: databricks-dataops-template
    target: ${bundle.target}
    git_branch: ${bundle.git.branch}

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    experimental:
      skip_name_prefix_for_schema: true
    variables:
      target_schema: dev
      quality_mode: drop

  pr:
    mode: development
    experimental:
      skip_name_prefix_for_schema: true
    variables:
      quality_mode: drop

  prod:
    mode: production
    git:
      branch: main
    workspace:
      root_path: /Shared/databricks-dataops-template/${bundle.git.branch}
    variables:
      target_schema: prod
      quality_mode: fail
    run_as:
      service_principal_name: ${var.sp_client_id}
